<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Sports Calendar{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <nav class="navbar">
        <a href="{{ url_for('main.index') }}" class="nav-brand">
            <span class="brand-icon">◈</span> SPORTS CALENDAR
        </a>
        <ul class="nav-links">
            <li><a href="{{ url_for('main.index') }}" class="{% if request.endpoint == 'main.index' %}active{% endif %}">Events</a></li>
            <li><a href="#">Teams</a></li>
            <li><a href="#">Standings</a></li>
            <li><a href="#">Schedule</a></li>
        </ul>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer>
        <span>SPORTS CALENDAR</span>
        <span>Sportradar Coding Academy</span>
    </footer>

</body>
</html>
